appId: com.apple.MobileAddressBook
tags:
  - contacts
  - ios
  - navigation
---
- stopApp
- launchApp:
    clearState: false
- repeat:
    times: 5
    while:
      notVisible:
        text: "All iPhone"
    commands:
      - tapOn:
          point: "5%, 7%"
      - waitForAnimationToEnd
- tapOn:
    text: "Back"
- waitForAnimationToEnd
- assertVisible:
    text: "Lists"
- assertVisible:
    text: "All Contacts"
- assertVisible:
    text: "All iPhone"
- assertVisible:
    text: "Friends"
- assertVisible:
    text: "Work"
- assertVisible:
    text: "Add List"
- takeScreenshot: "NavigateListsPanel-${new Date().toISOString().replace(/[:.]/g, '-')}.png"
- stopApp

appId: com.apple.MobileAddressBook
tags:
  - contacts
  - ios
  - navigation
---
- runFlow: _resetToHome_ios.yaml
- tapOn:
    text: "Back"
    optional: true
- tapOn:
    text: "Lists"
    optional: true
- waitForAnimationToEnd
- assertVisible:
    text: "Lists"
- assertVisible:
    text: "All Contacts"
- assertVisible:
    text: "All iPhone"
- assertVisible:
    text: "Friends"
- assertVisible:
    text: "Work"
- assertVisible:
    text: "Add List"
- takeScreenshot: "NavigateListsPanel-${new Date().toISOString().replace(/[:.]/g, '-')}.png"
- stopApp

appId: com.apple.MobileAddressBook
tags:
  - contacts
  - ios
  - navigation
---
- runFlow: _resetToHome_ios.yaml
- tapOn:
    text: "Back"
    optional: true
- tapOn:
    text: "Lists"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Work"
- waitForAnimationToEnd
- assertVisible:
    text: "No Contacts"
- assertVisible:
    text: "Contacts you've added will appear here."
- assertVisible:
    text: "Add Contacts"
- takeScreenshot: "EmptyListState-Work-${new Date().toISOString().replace(/[:.]/g, '-')}.png"
- stopApp

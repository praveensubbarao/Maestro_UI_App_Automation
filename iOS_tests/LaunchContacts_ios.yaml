appId: com.apple.MobileAddressBook
tags:
  - contacts
  - ios
  - smokeTest
---
- stopApp
- launchApp:
    clearState: false
- repeat:
    times: 5
    while:
      notVisible:
        text: "All iPhone"
    commands:
      - tapOn:
          point: "5%, 7%"
      - waitForAnimationToEnd
- tapOn:
    text: "All iPhone"
- tapOn:
    text: "Add"
- tapOn:
    text: "First name"
- inputText: ${faker.name().firstName()}
- tapOn:
    text: "Last name"
- inputText: ${faker.name().lastName()}
- tapOn:
    text: "Done"
- takeScreenshot: "LoginScreen-shard_${MAESTRO_SHARD_INDEX}-${new Date().toISOString().replace(/[:.]/g, '-')}.png"
- tapOn:
    text: "Edit"
- repeat:
    times: 3
    commands:
      - scroll
- tapOn:
    text: "Delete Contact"
- tapOn:
    text: "Delete Contact"
- assertVisible:
    text: "Lists"
- tapOn:
    text: "Lists"
- stopApp

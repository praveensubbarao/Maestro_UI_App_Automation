appId: com.apple.MobileAddressBook
tags:
  - contacts
  - ios
  - lists
---
- runFlow: _resetToHome_ios.yaml
- tapOn:
    text: "Back"
    optional: true
- tapOn:
    text: "Lists"
    optional: true
- waitForAnimationToEnd
- assertVisible:
    text: "Lists"
- tapOn:
    text: "Add List"
- assertVisible:
    text: "List Name"
- takeScreenshot: "AddList-prompt-${new Date().toISOString().replace(/[:.]/g, '-')}.png"
- tapOn:
    text: "Clear text"
- inputText: "Maestro Test List"
- pressKey: Return
- waitForAnimationToEnd
- assertVisible:
    text: "Maestro Test List"
- takeScreenshot: "AddList-created-${new Date().toISOString().replace(/[:.]/g, '-')}.png"
- stopApp

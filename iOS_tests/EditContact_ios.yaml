appId: com.apple.MobileAddressBook
tags:
  - contacts
  - ios
  - edit
---
- runFlow: _resetToHome_ios.yaml
- tapOn:
    text: "Kate Bell"
- assertVisible:
    text: "Edit"
- tapOn:
    text: "Edit"
- assertVisible:
    text: "Kate"
- assertVisible:
    text: "Bell"
- assertVisible:
    text: "add phone"
- assertVisible:
    text: "add email"
- takeScreenshot: "EditContact-${new Date().toISOString().replace(/[:.]/g, '-')}.png"
- tapOn:
    text: "Back"
    optional: true
- tapOn:
    text: "Lists"
    optional: true
- waitForAnimationToEnd
- stopApp

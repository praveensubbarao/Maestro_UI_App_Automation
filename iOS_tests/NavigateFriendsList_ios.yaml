appId: com.apple.MobileAddressBook
tags:
  - contacts
  - ios
  - navigation
---
- runFlow: _resetToHome_ios.yaml
- tapOn:
    text: "Back"
    optional: true
- tapOn:
    text: "Lists"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Friends"
- waitForAnimationToEnd
- assertVisible:
    text: "Friends"
- assertVisible:
    text: "Daniel Higgins Jr."
- takeScreenshot: "NavigateFriendsList-${new Date().toISOString().replace(/[:.]/g, '-')}.png"
- stopApp

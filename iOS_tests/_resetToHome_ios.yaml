appId: com.apple.MobileAddressBook
---
- stopApp
- launchApp:
    clearState: false
- repeat:
    times: 5
    while:
      notVisible:
        text: "All iPhone"
    commands:
      - tapOn:
          text: "Back"
          optional: true
      - tapOn:
          text: "Lists"
          optional: true
      - waitForAnimationToEnd
